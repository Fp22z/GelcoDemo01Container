server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: auth-service
              uri: lb://gelco-auth-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/usuarios/**
            - id: ventas-service
              uri: lb://gelco-ventas-service
              predicates:
                - Path=/api/v1/productos/**,/api/v1/pedidos/**,/api/v1/clientes/**,/api/v1/consultoras/**,/api/v1/ordenes-compra/**,/api/v1/categorias/**,/api/v1/ventas/**,/api/v1/home/**
            - id: ops-service
              uri: lb://gelco-ops-service
              predicates:
                - Path=/api/v1/devoluciones/**,/api/v1/rutas/**,/api/v1/capacitaciones/**
            - id: catalogo-service
              uri: lb://gelco-catalogo-service
              predicates:
                - Path=/api/v1/productos/**,/api/v1/categorias/**
            - id: consultoras-service
            - uri: lb://gelco-consultoras-service
            - predicates:
            - Path=/api/v1/consultoras/**,/api/v1/ventas/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}