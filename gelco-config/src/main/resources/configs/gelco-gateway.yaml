server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: auth-service
              uri: lb://gelco-auth-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/usuarios/**
            - id: catalogo-service
              uri: lb://gelco-catalogo-service
              predicates:
                - Path=/api/v1/productos/**,/api/v1/categorias/**
            - id: pedidos-service
              uri: lb://gelco-pedidos-service
              predicates:
                - Path=/api/v1/pedidos/**,/api/v1/clientes/**,/api/v1/ordenes-compra/**,/api/v1/home/**
            - id: consultoras-service
              uri: lb://gelco-consultoras-service
              predicates:
                - Path=/api/v1/consultoras/**,/api/v1/ventas/**
            - id: devoluciones-service
              uri: lb://gelco-devoluciones-service
              predicates:
                - Path=/api/v1/devoluciones/**
            - id: capacitacion-service
              uri: lb://gelco-capacitacion-service
              predicates:
                - Path=/api/v1/capacitaciones/**
            - id: distribucion-service
              uri: lb://gelco-distribucion-service
              predicates:
                - Path=/api/v1/rutas/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/