spring:
  application:
    name: gelco-config
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs

server:
  port: 8888

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.springframework.cloud.config: INFO