# ══════════════════════════════════════════════════════════
# AUTH — SQL Server — puerto 8081
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelco-auth-service
  namespace: gelco
spec:
  replicas: 1
  selector: { matchLabels: { app: gelco-auth-service } }
  template:
    metadata: { labels: { app: gelco-auth-service } }
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -T 3 -O- http://gelco-config:8888/actuator/health | grep -q '"status":"UP"'; do
                echo esperando a Config Server...
                sleep 5
              done
              until nc -z gelco-discovery 8761; do
                echo esperando a Eureka...
                sleep 3
              done
              until nc -z gelco-db-sqlserver 1433; do
                echo esperando a SQL Server...
                sleep 3
              done
      containers:
        - name: gelco-auth-service
          image: gelcodemo01container-gelco-auth-service
          imagePullPolicy: Never
          envFrom: [{ configMapRef: { name: gelco-common-config } }]
          ports: [{ containerPort: 8081 }]
---
apiVersion: v1
kind: Service
metadata: { name: gelco-auth-service, namespace: gelco }
spec:
  selector: { app: gelco-auth-service }
  ports: [{ port: 8081, targetPort: 8081 }]

