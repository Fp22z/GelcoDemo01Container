apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: gelco-config
  name: gelco-config
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gelco-config
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: gelco-config
    spec:
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://gelco-discovery:8761/eureka/
          image: gelco-config
          livenessProbe:
            exec:
              command:
                - wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
          name: gelco-config
          ports:
            - containerPort: 8888
              protocol: TCP
      restartPolicy: Always
