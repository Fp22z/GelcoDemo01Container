apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: gelco-catalogo-service
  name: gelco-catalogo-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gelco-catalogo-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: gelco-catalogo-service
    spec:
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://gelco-discovery:8761/eureka/
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://gelco-config:8888
          image: gelco-catalogo-service
          name: gelco-catalogo-service
          ports:
            - containerPort: 8082
              protocol: TCP
      restartPolicy: Always
