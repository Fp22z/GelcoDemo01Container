# ══════════════════════════════════════════════════════════
# SECRETS — credenciales sensibles (equivalente a las
# variables "environment:" con contraseñas en docker-compose)
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: gelco-db-secrets
  namespace: gelco
type: Opaque
stringData:
  MSSQL_SA_PASSWORD: "Gelco2026*Strong"
  POSTGRES_PASSWORD: "gelco2026*"
  MYSQL_ROOT_PASSWORD: "gelco2026*"
  MYSQL_PASSWORD: "gelco2026*"

---
# ══════════════════════════════════════════════════════════
# CONFIGMAP — variables comunes que TODOS los microservicios
# de negocio necesitan para encontrar Eureka y el Config Server.
# Equivale a las 2 líneas "environment:" repetidas en cada
# servicio del docker-compose.yml.
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: gelco-common-config
  namespace: gelco
data:
  # "gelco-config" y "gelco-discovery" aquí son nombres de Service
  # de Kubernetes (DNS interno del clúster), igual que en Docker
  # Compose eran nombres de contenedor.
  SPRING_CONFIG_IMPORT: "optional:configserver:http://gelco-config:8888"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://gelco-discovery:8761/eureka/"

---
# ══════════════════════════════════════════════════════════
# CONFIGMAP — script de inicialización de PostgreSQL
# (idéntico a init-db/postgres-init.sh)
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: gelco
data:
  init.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE DATABASE gelco_catalogo;
        CREATE DATABASE gelco_consultoras;
        CREATE DATABASE gelco_devoluciones;
        GRANT ALL PRIVILEGES ON DATABASE gelco_catalogo TO gelco_admin;
        GRANT ALL PRIVILEGES ON DATABASE gelco_consultoras TO gelco_admin;
        GRANT ALL PRIVILEGES ON DATABASE gelco_devoluciones TO gelco_admin;
    EOSQL

---
# ══════════════════════════════════════════════════════════
# CONFIGMAP — script de inicialización de MySQL
# (idéntico a init-db/mysql-init.sql)
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: gelco
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS gelco_pedidos CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS gelco_capacitacion CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS gelco_distribucion CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    GRANT ALL PRIVILEGES ON gelco_pedidos.* TO 'gelco_app'@'%';
    GRANT ALL PRIVILEGES ON gelco_capacitacion.* TO 'gelco_app'@'%';
    GRANT ALL PRIVILEGES ON gelco_distribucion.* TO 'gelco_app'@'%';
    FLUSH PRIVILEGES;

---
# ══════════════════════════════════════════════════════════
# CONFIGMAP — scripts de inicialización de SQL Server
# (idénticos a init-db/mssql-init.sql y mssql-entrypoint.sh)
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: mssql-init-script
  namespace: gelco
data:
  mssql-init.sql: |
    IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'gelco_auth')
    BEGIN
        CREATE DATABASE gelco_auth;
    END
  mssql-entrypoint.sh: |
    #!/bin/bash
    set -e
    /opt/mssql/bin/sqlservr &
    SQLSERVER_PID=$!
    echo "Esperando a que SQL Server arranque..."
    for i in {1..50}; do
        if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" &> /dev/null; then
            echo "SQL Server listo."
            break
        fi
        sleep 2
    done
    /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -i /init-db/mssql-init.sql
    wait $SQLSERVER_PID
