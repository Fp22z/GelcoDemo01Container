apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: gelco-db-mysql
  name: gelco-db-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gelco-db-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: gelco-db-mysql
    spec:
      containers:
        - env:
            - name: MYSQL_PASSWORD
              value: gelco2026*
            - name: MYSQL_ROOT_PASSWORD
              value: gelco2026*
            - name: MYSQL_USER
              value: gelco_app
          image: mysql:8.0
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -pgelco2026*
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
          name: gelco-db-mysql
          ports:
            - containerPort: 3306
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-data
            - mountPath: /docker-entrypoint-initdb.d/init.sql
              name: gelco-db-mysql-cm1
              subPath: init.sql
      restartPolicy: Always
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
        - configMap:
            items:
              - key: mysql-init.sql
                path: init.sql
            name: gelco-db-mysql-cm1
          name: gelco-db-mysql-cm1
