apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: gelco-discovery
  name: gelco-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gelco-discovery
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: gelco-discovery
    spec:
      containers:
        - image: gelcodemo01container-gelco-discovery
          imagePullPolicy: Never
          livenessProbe:
            exec:
              command:
                - wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
          name: gelco-discovery
          ports:
            - containerPort: 8761
              protocol: TCP
      restartPolicy: Always
