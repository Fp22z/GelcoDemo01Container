---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelco-db-sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gelco-db-sqlserver
  template:
    metadata:
      labels:
        app: gelco-db-sqlserver
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports: [{containerPort: 1433}]
          env:
            - {name: ACCEPT_EULA, value: "Y"}
            - {name: MSSQL_SA_PASSWORD, value: "Gelco2026*Strong"}
            - {name: MSSQL_PID, value: Express}
          volumeMounts:
            - {name: data, mountPath: /var/opt/mssql}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sqlserver-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelco-db-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gelco-db-postgres
  template:
    metadata:
      labels:
        app: gelco-db-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{containerPort: 5432}]
          env:
            - {name: POSTGRES_USER, value: gelco_admin}
            - {name: POSTGRES_PASSWORD, value: "gelco2026*"}
            - {name: POSTGRES_DB, value: gelco_catalogo}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelco-db-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gelco-db-mysql
  template:
    metadata:
      labels:
        app: gelco-db-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports: [{containerPort: 3306}]
          env:
            - {name: MYSQL_ROOT_PASSWORD, value: "gelco2026*"}
            - {name: MYSQL_USER, value: gelco_app}
            - {name: MYSQL_PASSWORD, value: "gelco2026*"}
          volumeMounts:
            - {name: data, mountPath: /var/lib/mysql}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelco-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gelco-discovery
  template:
    metadata:
      labels:
        app: gelco-discovery
    spec:
      containers:
        - name: gelco-discovery
          image: gelcodemo01container-gelco-discovery
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8761}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelco-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gelco-config
  template:
    metadata:
      labels:
        app: gelco-config
    spec:
      containers:
        - name: gelco-config
          image: gelcodemo01container-gelco-config
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8888}]
          env:
            - {name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE, value: "http://gelco-discovery:8761/eureka/"}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelco-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gelco-gateway
  template:
    metadata:
      labels:
        app: gelco-gateway
    spec:
      containers:
        - name: gelco-gateway
          image: gelcodemo01container-gelco-gateway
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
          env:
            - {name: SPRING_CONFIG_IMPORT, value: "optional:configserver:http://gelco-config:8888"}
            - {name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE, value: "http://gelco-discovery:8761/eureka/"}
---
