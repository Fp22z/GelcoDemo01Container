apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-db-sqlserver
spec:
  ports: [{port: 1433, targetPort: 1433}]
  selector:
    app: gelco-db-sqlserver
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-db-postgres
spec:
  ports: [{port: 5432, targetPort: 5432}]
  selector:
    app: gelco-db-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-db-mysql
spec:
  ports: [{port: 3306, targetPort: 3306}]
  selector:
    app: gelco-db-mysql
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-discovery
spec:
  ports: [{port: 8761, targetPort: 8761}]
  selector:
    app: gelco-discovery
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-config
spec:
  ports: [{port: 8888, targetPort: 8888}]
  selector:
    app: gelco-config
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-gateway
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: gelco-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-auth-service
spec:
  ports: [{port: 8081, targetPort: 8081}]
  selector:
    app: gelco-auth-service
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-catalogo-service
spec:
  ports: [{port: 8082, targetPort: 8082}]
  selector:
    app: gelco-catalogo-service
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-pedidos-service
spec:
  ports: [{port: 8083, targetPort: 8083}]
  selector:
    app: gelco-pedidos-service
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-consultoras-service
spec:
  ports: [{port: 8084, targetPort: 8084}]
  selector:
    app: gelco-consultoras-service
---
apiVersion: v1
kind: Service
metadata:
  name: gelco-capacitacion-service
spec:
  ports: [{port: 8085, targetPort: 8085}]
  selector:
    app: gelco-capacitacion-service
---
apiVersion: v1
kind: Service
